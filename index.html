<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillGap AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>SkillGap AI</h1>
    <p>Analyze your skills & discover what to learn next 🚀</p>
  </header>

  <section class="container">
    
    <h2>Select Your Skills</h2>

    <div class="skills">
      <label><input type="checkbox" value="HTML"> HTML</label>
      <label><input type="checkbox" value="CSS"> CSS</label>
      <label><input type="checkbox" value="JavaScript"> JavaScript</label>
      <label><input type="checkbox" value="Python"> Python</label>
      <label><input type="checkbox" value="React"> React</label>
    </div>

    <button id="analyzeBtn">Analyze Skills</button>

    <div id="result" class="result-box"></div>

  </section>

  <footer>
    <p>© 2026 SkillGap AI | Built by Satyam Pratap</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
